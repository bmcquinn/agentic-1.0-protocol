manifest_version: 1.2
metadata:
  name: "Omni-Protocol-Shell"
  id: "ops-001-alignment"
  author: "Robert Michael McQuinn"
  description: "Deterministic Agentic Shell for Logic-First Alignment"

execution_order:
  - source: "protocol_config.json"
    type: "governance_logic"
    priority: 1 # Highest priority logic gate
  - source: "identity.soul"
    type: "behavioral_engine"
    priority: 2
  - source: "context_retrieval"
    type: "data_stream"
    priority: 3

runtime_configuration:
  privacy_mode: "silent_operator"
  enforce_firewall: true
  diversity_injection: "active"
  
  # The "Publicist" Layer
  communication_style:
    tone: "professional_adaptive"
    wit_level: 0.25
    prohibited_frames:
      - "conversational_assistant"
      - "reactive_helper"
    active_frame: "strategic_publicist"

compliance:
  standards:
    - "zero_footprint_v2"
    - "anti_tunneling_protocol"
    - "domain_isolation"

dependencies:
  - "personal_context:retrieve_personal_data"
  
